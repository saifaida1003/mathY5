<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Galaxy Defender - Darjah 5</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');
        body { font-family: 'Orbitron', sans-serif; }
        .stars {
            background-image: radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 40px);
            background-size: 550px 550px;
            animation: move-stars 10s linear infinite;
        }
        @keyframes move-stars {
            from { background-position: 0 0; }
            to { background-position: 550px 550px; }
        }
        .shake { animation: shake 0.5s; }
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10-20% { transform: translate(-3px, 0px) rotate(-1deg); }
            30-40% { transform: translate(3px, 2px) rotate(1deg); }
            50-60% { transform: translate(-1px, -1px) rotate(1deg); }
            70-80% { transform: translate(-3px, 1px) rotate(-1deg); }
            90-100% { transform: translate(1px, -2px) rotate(0deg); }
        }
    </style>
</head>
<body class="bg-black text-white min-h-screen overflow-hidden flex items-center justify-center p-4">
    <div class="stars absolute inset-0 z-0"></div>

    <div id="game-container" class="relative z-10 w-full max-w-2xl bg-gray-900 bg-opacity-80 p-8 rounded-3xl border-4 border-blue-500 shadow-[0_0_50px_rgba(59,130,246,0.5)]">
        
        <!-- UI Atas -->
        <div class="flex justify-between items-center mb-8">
            <div class="text-left">
                <p class="text-blue-400 text-xs uppercase tracking-widest">Markah</p>
                <p id="score" class="text-2xl font-bold">0</p>
            </div>
            <div class="text-center">
                <h1 class="text-2xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500">GALAXY MATH D5</h1>
            </div>
            <div class="text-right">
                <p class="text-red-400 text-xs uppercase tracking-widest">Masa</p>
                <p id="timer" class="text-2xl font-bold">40</p>
            </div>
        </div>

        <!-- Skrin Mula -->
        <div id="start-screen" class="text-center py-10">
            <div class="mb-6 text-6xl">🛸</div>
            <h2 class="text-3xl font-bold mb-4 italic">Operasi Khas Darjah 5</h2>
            <p class="text-gray-400 mb-8">Pertahankan stesen angkasa daripada asteroid nombor!</p>
            <button onclick="startGame()" class="bg-gradient-to-r from-blue-600 to-blue-800 hover:from-blue-500 hover:to-blue-700 px-10 py-4 rounded-full font-bold text-xl transition-all hover:scale-105 shadow-[0_0_20px_rgba(59,130,246,0.5)]">LANCARKAN MISI</button>
        </div>

        <!-- Skrin Permainan -->
        <div id="play-screen" class="hidden text-center">
            <div id="question-box" class="bg-gray-800 p-8 rounded-2xl mb-8 border border-gray-700 shadow-inner">
                <p id="question-label" class="text-blue-400 text-sm mb-2 uppercase tracking-tighter italic"></p>
                <p id="question-text" class="text-4xl md:text-5xl font-bold tracking-wider text-white"></p>
            </div>
            <div class="grid grid-cols-2 gap-4" id="options-container">
                <!-- Butang jawapan dijana secara dinamik -->
            </div>
        </div>

        <!-- Skrin Tamat -->
        <div id="end-screen" class="hidden text-center py-10">
            <h2 class="text-4xl font-bold mb-2">MISI SELESAI</h2>
            <p id="final-status" class="text-xl text-cyan-400 mb-6 font-bold"></p>
            <div class="bg-blue-900 bg-opacity-30 p-8 rounded-2xl mb-8 inline-block border border-blue-500">
                <p class="text-sm uppercase tracking-widest text-blue-300 mb-2">Jumlah Skor</p>
                <p id="final-score" class="text-7xl font-bold text-white">0</p>
            </div>
            <br>
            <button onclick="startGame()" class="bg-cyan-600 hover:bg-cyan-500 px-10 py-4 rounded-full font-bold text-xl transition-all shadow-lg">MAIN SEMULA</button>
        </div>

    </div>

    <!-- Feedback Visual -->
    <div id="feedback" class="fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 text-8xl pointer-events-none opacity-0 transition-opacity z-50"></div>

    <script>
        let score = 0;
        let timeLeft = 40;
        let timerId = null;
        let correctAnswer = 0;

        const screens = {
            start: document.getElementById('start-screen'),
            play: document.getElementById('play-screen'),
            end: document.getElementById('end-screen')
        };

        function showScreen(name) {
            Object.keys(screens).forEach(key => screens[key].classList.add('hidden'));
            screens[name].classList.remove('hidden');
        }

        function startGame() {
            score = 0;
            timeLeft = 40;
            document.getElementById('score').innerText = score;
            document.getElementById('timer').innerText = timeLeft;
            showScreen('play');
            nextQuestion();
            startTimer();
        }

        function startTimer() {
            if(timerId) clearInterval(timerId);
            timerId = setInterval(() => {
                timeLeft--;
                document.getElementById('timer').innerText = timeLeft;
                if(timeLeft <= 0) endGame();
            }, 1000);
        }

        function generateQuestion() {
            const types = ['tambah', 'tolak', 'pecahan', 'peratus', 'perpuluhan'];
            const type = types[Math.floor(Math.random() * types.length)];
            let question = "";
            let label = "";
            let answer = 0;

            switch(type) {
                case 'tambah':
                    label = "Nombor Bulat";
                    const a1 = Math.floor(Math.random() * 800) + 100;
                    const a2 = Math.floor(Math.random() * 800) + 100;
                    question = `${a1} + ${a2}`;
                    answer = a1 + a2;
                    break;
                case 'tolak':
                    label = "Nombor Bulat";
                    const s1 = Math.floor(Math.random() * 900) + 500;
                    const s2 = Math.floor(Math.random() * 400) + 50;
                    question = `${s1} - ${s2}`;
                    answer = s1 - s2;
                    break;
                case 'pecahan':
                    label = "Pecahan daripada Kuantiti";
                    const numerators = [1, 1, 2, 3, 1];
                    const denominators = [2, 4, 5, 10, 5];
                    const idx = Math.floor(Math.random() * numerators.length);
                    const base = (Math.floor(Math.random() * 10) + 1) * denominators[idx] * 2;
                    question = `${numerators[idx]}/${denominators[idx]} daripada ${base}`;
                    answer = (numerators[idx] / denominators[idx]) * base;
                    break;
                case 'peratus':
                    label = "Peratusan";
                    const p = [10, 20, 25, 50, 100][Math.floor(Math.random() * 5)];
                    const pVal = (Math.floor(Math.random() * 10) + 1) * 10;
                    question = `${p}% daripada ${pVal}`;
                    answer = (p/100) * pVal;
                    break;
                case 'perpuluhan':
                    label = "Perpuluhan (x10 / x100)";
                    const dec = (Math.random() * 10 + 1).toFixed(2);
                    const multiplier = Math.random() > 0.5 ? 10 : 100;
                    question = `${dec} × ${multiplier}`;
                    answer = parseFloat((dec * multiplier).toFixed(2));
                    break;
            }

            correctAnswer = answer;
            let options = [answer];
            while(options.length < 4) {
                let offset = (Math.floor(Math.random() * 5) + 1) * (Math.random() > 0.5 ? 1 : -1);
                let fake = parseFloat((answer + offset).toFixed(2));
                if(!options.includes(fake) && fake >= 0) options.push(fake);
            }

            return { question, label, options: options.sort(() => Math.random() - 0.5) };
        }

        function nextQuestion() {
            const data = generateQuestion();
            document.getElementById('question-text').innerText = data.question;
            document.getElementById('question-label').innerText = data.label;
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            
            data.options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = "bg-gray-800 hover:bg-blue-900 border-2 border-gray-700 p-5 rounded-2xl text-2xl font-bold transition-all hover:scale-105 active:scale-95";
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(opt, btn);
                container.appendChild(btn);
            });
        }

        function checkAnswer(selected, btn) {
            const container = document.getElementById('game-container');

            if(Math.abs(selected - correctAnswer) < 0.001) {
                score += 10;
                timeLeft += 3; // Bonus masa untuk D5
                document.getElementById('score').innerText = score;
                showFeedback('⚡', true);
                nextQuestion();
            } else {
                container.classList.add('shake');
                setTimeout(() => container.classList.remove('shake'), 500);
                showFeedback('💥', false);
                btn.classList.add('bg-red-900', 'border-red-500', 'opacity-50');
                btn.disabled = true;
            }
        }

        function showFeedback(emoji, isCorrect) {
            const f = document.getElementById('feedback');
            f.innerText = emoji;
            f.style.opacity = '1';
            setTimeout(() => f.style.opacity = '0', 600);
        }

        function endGame() {
            clearInterval(timerId);
            document.getElementById('final-score').innerText = score;
            let msg = "";
            if(score >= 150) msg = "KOMANDAN GALAXY!";
            else if(score >= 80) msg = "Wira Angkasa Hebat!";
            else msg = "Latihan diperlukan, Perajurit!";
            
            document.getElementById('final-status').innerText = msg;
            showScreen('end');
        }
    </script>
</body>
</html>
